# 《山野小村》信令服务器 Nginx 配置
# 将此文件放入 /etc/nginx/sites-available/ 并 ln -s 到 sites-enabled/
#
# 前提条件：
#   1. 已安装 nginx: apt install nginx
#   2. 已安装 certbot: apt install certbot python3-certbot-nginx
#   3. 已获取 SSL 证书: certbot --nginx -d signaling.shanyexiaocun.com
#
# 注意：请将 signaling.shanyexiaocun.com 替换为你的实际域名

server {
    listen 80;
    server_name signaling.shanyexiaocun.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name signaling.shanyexiaocun.com;

    # SSL 证书（certbot 自动管理）
    ssl_certificate /etc/letsencrypt/live/signaling.shanyexiaocun.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/signaling.shanyexiaocun.com/privkey.pem;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;

    # WebSocket 反向代理
    location /ws {
        proxy_pass http://127.0.0.1:8888;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;  # 24小时保持WebSocket连接
        proxy_send_timeout 86400;
    }

    # 健康检查端点（允许外部访问）
    location /health {
        proxy_pass http://127.0.0.1:8889;
        proxy_set_header Host $host;
    }

    # 统计端点（仅允许内网访问）
    location /stats {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny all;
        proxy_pass http://127.0.0.1:8889;
    }
}
